<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SailSense Hub</title>
<link rel="icon" href="favicon.ico" sizes="16x16 32x32 48x48" type="image/x-icon">
<link rel="icon" href="icon.png" sizes="512x512" type="image/png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a1628;
  --surface: #122040;
  --border: #1e3560;
  --accent: #2a6de5;
  --green: #22c55e;
  --red: #ef4444;
  --amber: #f59e0b;
  --text: #e2e8f0;
  --muted: #94a3b8;
}
body { background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; min-height: 100vh; }

header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 1.25rem;
  display: flex;
  align-items: center;
}
header h1 { font-size: 1.05rem; font-weight: 600; padding: 0.9rem 0; }
#status-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--red); flex-shrink: 0;
  margin-right: 0.75rem;
  transition: background 0.3s;
}
#status-dot.connected { background: var(--green); box-shadow: 0 0 6px var(--green); }

nav {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  overflow-x: auto;
}
nav button {
  background: none; border: none;
  border-bottom: 3px solid transparent;
  color: var(--muted); cursor: pointer;
  font-size: 0.875rem; font-family: inherit;
  padding: 0.8rem 1.25rem;
  white-space: nowrap;
  transition: color 0.15s, border-color 0.15s;
}
nav button.active { color: var(--text); border-bottom-color: var(--accent); }
nav button:hover:not(.active) { color: var(--text); }

.panel { display: none; padding: 1.25rem; }
.panel.active { display: block; }

.grid { display: grid; gap: 1rem; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); }

/* Battery */
.battery-group {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 1.25rem;
}
.battery-name { font-size: 0.95rem; font-weight: 600; margin-bottom: 1rem; color: var(--text); }
.battery-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
.stat-label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 0.15rem; }
.stat-row { display: flex; justify-content: space-between; align-items: baseline; }
.stat-value { font-size: 1.35rem; font-weight: 700; }
.stat-unit { font-size: 0.78rem; color: var(--muted); margin-left: 0.15rem; }
.soc-bar { margin-top: 1rem; }
.soc-track { background: var(--bg); border-radius: 4px; height: 8px; overflow: hidden; }
.soc-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
.soc-labels { font-size: 0.7rem; color: var(--muted); display: flex; justify-content: space-between; margin-top: 0.3rem; }

/* Tank */
.tank-section-title {
  font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.06em;
  color: var(--muted); margin-bottom: 0.75rem;
  padding-bottom: 0.4rem; border-bottom: 1px solid var(--border);
}
.tank-group { margin-bottom: 1.75rem; }
.tank-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 1.1rem;
}
.tank-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 0.6rem; }
.tank-name { font-size: 0.85rem; font-weight: 600; }
.tank-pct { font-size: 1.4rem; font-weight: 700; }
.tank-track { background: var(--bg); border-radius: 4px; height: 10px; overflow: hidden; margin-bottom: 0.5rem; }
.tank-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
.tank-fill.water { background: #3b82f6; }
.tank-fill.fuel  { background: #f59e0b; }
.tank-fill.black { background: #6b7280; }
.tank-litres { font-size: 0.78rem; color: var(--muted); }

/* Breakers */
.breaker-grid { display: grid; gap: 0.6rem; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); }
.breaker {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 0.8rem 1rem;
  display: flex; align-items: center; width: 100%;
  cursor: pointer; transition: border-color 0.15s;
  touch-action: manipulation;
  -webkit-user-select: none; user-select: none;
  -webkit-tap-highlight-color: transparent;
  /* Reset native button styles */
  -webkit-appearance: none; appearance: none;
  font-family: inherit; font-size: inherit; color: inherit;
  text-align: left;
}
.breaker:hover, .breaker:active { border-color: var(--accent); }
.breaker-dot {
  width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0;
  margin-right: 0.75rem;
  background: #374151; transition: background 0.3s, box-shadow 0.3s;
}
.breaker-dot.on  { background: var(--green); box-shadow: 0 0 6px var(--green); }
.breaker-dot.off { background: var(--red); }
.breaker-name { font-size: 0.83rem; line-height: 1.3; }
.breaker-val  { font-size: 0.68rem; color: var(--muted); margin-top: 0.1rem; }

/* Lights */
.light-section { margin-bottom: 1.5rem; }
.light-section-title {
  font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.06em;
  color: var(--muted); margin-bottom: 0.6rem;
  padding-bottom: 0.4rem; border-bottom: 1px solid var(--border);
}
.light-grid { display: grid; gap: 0.5rem; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
.light-item {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 6px; padding: 0.6rem 0.875rem;
  display: flex; align-items: center;
}
.light-dot {
  width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
  margin-right: 0.6rem;
  background: #374151; transition: background 0.3s, box-shadow 0.3s;
}
.light-dot.on { background: #fbbf24; box-shadow: 0 0 7px #fbbf24; }
.light-name { font-size: 0.83rem; }

.placeholder { color: var(--muted); font-size: 0.9rem; padding: 3rem 0; text-align: center; }
</style>
</head>
<body>

<header>
  <div id="status-dot"></div>
  <h1 id="vessel-name">SailSense Hub</h1>
</header>

<nav>
  <button class="active" data-tab="home">Home</button>
  <button data-tab="power">Power</button>
  <button data-tab="tanks">Tanks</button>
  <button data-tab="breakers">Breakers</button>
  <button data-tab="lights">Lights &amp; Pumps</button>
</nav>

<div id="tab-home"     class="panel active"></div>
<div id="tab-power"    class="panel"></div>
<div id="tab-tanks"    class="panel"></div>
<div id="tab-breakers" class="panel"></div>
<div id="tab-lights"   class="panel"></div>

<script>
// ─── Constants ───────────────────────────────────────────────────────────────

const POLL_MS = 3000;

// Auth token injected by signalk-navico-embedder (window.SK_TOKEN), or absent
// when accessed directly from a browser that already has a SK session cookie.
const SK_TOKEN = (window.SK_TOKEN !== undefined) ? window.SK_TOKEN : null;

const BREAKERS = [
  'Cockpit fridge', 'Electronic', 'Fans', 'Fresh water rinsing pump',
  'Front Galley Freezer', 'Front Galley Fridge', 'Galley cool box',
  'Galley sea water pump', 'HIFI', 'Nav table screen Nep 2',
  'Oven - plate inverter', 'Sea water rinsing pump',
  'STBD front cabin fridge', 'TAC reading lights', 'TV amplifier',
];

const LIGHT_GROUPS = [
  { title: 'Nacelle Lights',      group: 'nacelle_lights',  names: ['Saloon light', 'Saloon indirect light', 'Cockpit light'] },
  { title: 'Exterior Lights',     group: 'exterior_light',  names: ['Submarine light', 'Foredeck courtesy light', 'Under bridge deck light', 'Cockpit courtesy light', 'Spreader light'] },
  { title: 'Port Cabin Lights',   group: 'port_lights',     names: ['reading light', 'rear cabin light', 'corridor light', 'front cabin light'], prefix: 'Port ' },
  { title: 'Stbd Cabin Lights', group: 'stbd_lights',  names: ['reading light', 'rear cabin light', 'corridor light', 'front cabin light'], prefix: 'Stbd ' },
];

const PUMP_GROUPS = [
  { title: 'Bilge Pumps', group: 'bilge_pumps', names: ['Port engine bilge pump', 'Port hull bilge pump', 'STBD engine bilge pump', 'STBD hull bilge pump'] },
  { title: 'Water Pumps', group: 'water_pump',  names: ['Fresh water pump', 'Port grey water pump', 'STBD grey water pump'] },
];

// ─── State ───────────────────────────────────────────────────────────────────

// Flat map of Signal K path → value, e.g. "sailsense.batteries.Main.Bank1.voltage" → 12.6
const state = {};
var activeWS = null;
var sessionToken = null;
try { sessionToken = sessionStorage.getItem('sk-auth-token'); } catch(e) {}

// Debounce render so rapid WS bursts (initial SK dump, many active paths) only
// produce one DOM update per 250 ms — critical for slow MFD CPUs.
var renderTimer = null;
function scheduleRender() {
  if (renderTimer) return;
  renderTimer = setTimeout(function() {
    renderTimer = null;
    render();
  }, 250);
}

// ─── Path helpers ─────────────────────────────────────────────────────────────

// Mirrors the sanitisation in index.js topicToPath()
function toKey(name) {
  return name.replace(/%/g, 'pct').replace(/[^a-zA-Z0-9_-]/g, '_');
}

function toLabel(name) {
  return name.replace(/STBD/g, 'Stbd');
}

function toTitleCase(s) {
  return s.replace(/\b\w/g, function(c) { return c.toUpperCase(); });
}

function get(path) { return state[path]; }

function isOn(val) { return val === true || val === 'on' || val === 'True'; }

function fmt(v, dp = 1) { return v == null ? '–' : Number(v).toFixed(dp); }

// ─── Tab switching ────────────────────────────────────────────────────────────

function activateTab(name) {
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  const btn = document.querySelector(`nav button[data-tab="${name}"]`);
  if (btn) btn.classList.add('active');
  const panel = document.getElementById('tab-' + name);
  if (panel) panel.classList.add('active');
  location.hash = name;
}

document.querySelectorAll('nav button').forEach(btn => {
  btn.addEventListener('click', () => activateTab(btn.dataset.tab));
});

window.addEventListener('hashchange', () => {
  const tab = location.hash.slice(1);
  if (document.getElementById('tab-' + tab)) activateTab(tab);
});

// ─── Data loading ─────────────────────────────────────────────────────────────

// Recursively flatten a nested Signal K API response into state[path] = value
function flatten(obj, prefix) {
  if (obj == null || typeof obj !== 'object' || Array.isArray(obj)) return;
  // Leaf node: Signal K value object { value, $source, timestamp }
  if ('value' in obj && (typeof obj.value !== 'object' || obj.value === null)) {
    state[prefix] = obj.value;
    return;
  }
  for (const k of Object.keys(obj)) {
    if (k === '$source' || k === 'timestamp' || k === 'sentence' || k === 'pgn') continue;
    flatten(obj[k], prefix + '.' + k);
  }
}

async function fetchVesselName() {
  try {
    const headers = SK_TOKEN ? { 'Authorization': 'Bearer ' + SK_TOKEN } : {};
    const r = await fetch('/signalk/v1/api/vessels/self/name', { credentials: 'include', headers: headers });
    if (!r.ok) return;
    const name = await r.json();
    const label = (typeof name === 'string' && name.trim()) ? name.trim() : 'SailSense Hub';
    document.title = label;
    document.getElementById('vessel-name').textContent = label;
  } catch (_) {}
}

async function fetchAll() {
  try {
    const headers = SK_TOKEN ? { 'Authorization': 'Bearer ' + SK_TOKEN } : {};
    const [r1, r2, r3, r4, r5] = await Promise.all([
      fetch('/signalk/v1/api/vessels/self/sailsense', { credentials: 'include', headers: headers }),
      fetch('/signalk/v1/api/vessels/self/electrical/batteries', { credentials: 'include', headers: headers }),
      fetch('/signalk/v1/api/vessels/self/electrical/solar', { credentials: 'include', headers: headers }),
      fetch('/signalk/v1/api/vessels/self/electrical/inverters', { credentials: 'include', headers: headers }),
      fetch('/signalk/v1/api/vessels/self/electrical/venus', { credentials: 'include', headers: headers }),
    ]);
    if (r1.status === 401) { showAuthError(); return; }
    if (r1.ok) { const d = await r1.json(); flatten(d, 'sailsense'); }
    if (r2.ok) { const d = await r2.json(); flatten(d, 'electrical.batteries'); }
    if (r3.ok) { const d = await r3.json(); flatten(d, 'electrical.solar'); }
    if (r4.ok) { const d = await r4.json(); flatten(d, 'electrical.inverters'); }
    if (r5.ok) { const d = await r5.json(); flatten(d, 'electrical.venus'); }
    scheduleRender();
  } catch (_) { /* keep polling */ }
}

function showAuthError() {
  var msg = '<p class="placeholder">Signal K authentication required — no data available.<br>'
    + 'In Signal K admin go to <strong>Security</strong> and either enable '
    + '<em>Allow Read-Only Access</em>, or add a token to the Navico MFD Embedder config.</p>';
  document.getElementById('tab-home').innerHTML     = msg;
  document.getElementById('tab-power').innerHTML    = msg;
  document.getElementById('tab-tanks').innerHTML    = msg;
  document.getElementById('tab-breakers').innerHTML = msg;
  document.getElementById('tab-lights').innerHTML   = msg;
}

// ─── WebSocket ────────────────────────────────────────────────────────────────

function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const tokenParam = SK_TOKEN ? '&token=' + encodeURIComponent(SK_TOKEN) : '';
  const ws = new WebSocket(proto + '//' + location.host + '/signalk/v1/stream?subscribe=none' + tokenParam);
  activeWS = ws;

  ws.onopen = () => {
    setConnected(true);
    ws.send(JSON.stringify({
      context: 'vessels.self',
      subscribe: [
        { path: 'sailsense.*', period: 1000, policy: 'fixed' },
        { path: 'electrical.batteries.*', period: 1000, policy: 'fixed' },
        { path: 'electrical.solar.*', period: 1000, policy: 'fixed' },
        { path: 'electrical.inverters.*', period: 1000, policy: 'fixed' },
        { path: 'electrical.venus.*', period: 1000, policy: 'fixed' },
      ],
    }));
  };

  ws.onmessage = (e) => {
    let msg;
    try { msg = JSON.parse(e.data); } catch (_) { return; }
    if (!msg.updates) return;
    for (const upd of msg.updates) {
      for (const v of (upd.values || [])) {
        state[v.path] = v.value;
      }
    }
    scheduleRender();
  };

  ws.onclose = () => { activeWS = null; setConnected(false); setTimeout(connectWS, 2000); };
  ws.onerror = () => ws.close();
}

function setConnected(ok) {
  document.getElementById('status-dot').className = ok ? 'connected' : '';
}

// ─── Render ───────────────────────────────────────────────────────────────────

function render() {
  renderHome();
  renderPower();
  renderTanks();
  renderBreakers();
  renderLights();
}

// ─── Home tab ─────────────────────────────────────────────────────────────────

function renderSolarCard() {
  var totalPower = null;
  var totalCurrent = null;
  for (var path in state) {
    var m = path.match(/^electrical\.solar\.([^.]+)\.(panelPower|current)$/);
    if (!m) continue;
    var val = Number(state[path]);
    if (isNaN(val)) continue;
    if (m[2] === 'panelPower') totalPower = (totalPower != null ? totalPower : 0) + val;
    else totalCurrent = (totalCurrent != null ? totalCurrent : 0) + val;
  }
  var barPct = totalPower != null ? Math.min(totalPower / 2500 * 100, 100) : 0;
  return '<div class="battery-group">'
    + '<div class="battery-name">Solar Yield</div>'
    + '<div class="battery-stats">'
    +   '<div class="stat-row" style="grid-column:span 2">'
    +     '<div class="stat-label">Power</div>'
    +     '<div class="stat-value">' + fmt(totalPower, 0) + '<span class="stat-unit">W</span></div>'
    +   '</div>'
    +   '<div class="stat-row" style="grid-column:span 2">'
    +     '<div class="stat-label">Current</div>'
    +     '<div class="stat-value">' + fmt(totalCurrent, 1) + '<span class="stat-unit">A</span></div>'
    +   '</div>'
    + '</div>'
    + '<div class="soc-bar">'
    +   '<div class="soc-track">'
    +     '<div class="soc-fill" style="width:' + barPct + '%; background:var(--amber)"></div>'
    +   '</div>'
    +   '<div class="soc-labels"><span>0W</span><span>2500W</span></div>'
    + '</div>'
    + '</div>';
}

function renderLoadsCard() {
  var acPower = null;
  var acCurrent = null;
  var p, mv, val;
  for (p in state) {
    mv = p.match(/^electrical\.inverters\.([^.]+)\.acout\.(power|current)$/);
    if (!mv) continue;
    val = Number(state[p]);
    if (isNaN(val)) continue;
    if (mv[2] === 'power') acPower = (acPower != null ? acPower : 0) + val;
    else acCurrent = (acCurrent != null ? acCurrent : 0) + val;
  }

  var dcPower = state['electrical.venus.dcPower'] != null ? Number(state['electrical.venus.dcPower']) : null;
  if (dcPower != null && isNaN(dcPower)) dcPower = null;

  var dcCurrent = null;
  if (dcPower != null) {
    for (p in state) {
      mv = p.match(/^electrical\.batteries\.([^.]+)\.voltage$/);
      if (!mv) continue;
      val = Number(state[p]);
      if (!isNaN(val) && val > 0) { dcCurrent = dcPower / val; break; }
    }
  }

  return '<div class="battery-group">'
    + '<div class="battery-name">Loads</div>'
    + '<div class="battery-stats">'
    +   '<div>'
    +     '<div class="stat-label">AC Power</div>'
    +     '<div class="stat-value">' + fmt(acPower, 0) + '<span class="stat-unit">W</span></div>'
    +   '</div>'
    +   '<div>'
    +     '<div class="stat-label">AC Current</div>'
    +     '<div class="stat-value">' + fmt(acCurrent, 1) + '<span class="stat-unit">A</span></div>'
    +   '</div>'
    +   '<div>'
    +     '<div class="stat-label">DC Power</div>'
    +     '<div class="stat-value">' + fmt(dcPower, 0) + '<span class="stat-unit">W</span></div>'
    +   '</div>'
    +   '<div>'
    +     '<div class="stat-label">DC Current</div>'
    +     '<div class="stat-value">' + fmt(dcCurrent, 1) + '<span class="stat-unit">A</span></div>'
    +   '</div>'
    + '</div>'
    + '</div>';
}

function renderTankCardFromValues(label, pct, litres, type) {
  var display = pct != null ? Math.round(Number(pct)) : null;
  var currentGal = litres != null ? Number(litres) * 0.264172 : null;
  var totalGal = (litres != null && pct != null && Number(pct) > 0)
    ? Number(litres) * 100 / Number(pct) * 0.264172 : null;
  var volLabel = currentGal != null && totalGal != null
    ? fmt(currentGal, 1) + ' / ' + fmt(totalGal, 0) + ' gal'
    : currentGal != null ? fmt(currentGal, 1) + ' gal' : 'No data';
  return '<div class="tank-card">'
    + '<div class="tank-header">'
    +   '<span class="tank-name">' + label + '</span>'
    +   '<span class="tank-pct">' + (display != null ? display + '%' : '–') + '</span>'
    + '</div>'
    + '<div class="tank-track">'
    +   '<div class="tank-fill ' + type + '" style="width:' + Math.min(display != null ? display : 0, 100) + '%"></div>'
    + '</div>'
    + '<div class="tank-litres">' + volLabel + '</div>'
    + '</div>';
}

function renderHome() {
  var base = 'sailsense.tanks';
  var portPct  = state[base + '.water_tanks.water_tank_portside.levels.pct'];
  var stbdPct  = state[base + '.water_tanks.water_tank_starboard.levels.pct'];
  var portL    = state[base + '.water_tanks.water_tank_portside.levels.L'];
  var stbdL    = state[base + '.water_tanks.water_tank_starboard.levels.L'];

  var avgPct = null;
  if (portPct != null && stbdPct != null) {
    avgPct = (Number(portPct) + Number(stbdPct)) / 2;
  } else if (portPct != null) {
    avgPct = Number(portPct);
  } else if (stbdPct != null) {
    avgPct = Number(stbdPct);
  }

  var totalL = null;
  if (portL != null && stbdL != null) {
    totalL = Number(portL) + Number(stbdL);
  } else if (portL != null) {
    totalL = Number(portL);
  } else if (stbdL != null) {
    totalL = Number(stbdL);
  }

  var houseBanks = getHouseBanks();

  document.getElementById('tab-home').innerHTML =
    '<div class="tank-group">'
    + '<div class="tank-section-title">Electrical</div>'
    + '<div class="grid">'
    + Object.keys(houseBanks).map(function(id, i) { return renderHouseBatteryCard(id, houseBanks[id], i); }).join('')
    + renderSolarCard()
    + renderLoadsCard()
    + '</div></div>'
    + '<div class="tank-group">'
    + '<div class="tank-section-title">Tanks</div>'
    + '<div class="grid">'
    +   renderTankCardFromValues('Fresh Water', avgPct, totalL, 'water')
    +   renderTankCard('Port Blackwater', base + '.blackwater_tanks.blackwater_tank_portside.levels', 'black')
    +   renderTankCard('Stbd Blackwater', base + '.blackwater_tanks.blackwater_tank_starboard.levels', 'black')
    + '</div>'
    + '</div>';
}

// ─── Power tab ────────────────────────────────────────────────────────────────

function socColor(pct) {
  if (pct >= 70) return 'var(--green)';
  if (pct >= 30) return 'var(--amber)';
  return 'var(--red)';
}

function getHouseBanks() {
  const banks = {};
  for (const [path, val] of Object.entries(state)) {
    const m = path.match(/^electrical\.batteries\.([^.]+)\.(.+)$/);
    if (!m) continue;
    if (!banks[m[1]]) banks[m[1]] = {};
    banks[m[1]][m[2]] = val;
  }
  return banks;
}

function renderHouseBatteryCard(id, data, index) {
  const soc = data['capacity.stateOfCharge'] != null
    ? Math.round(Number(data['capacity.stateOfCharge']) * 100) : null;
  const color = soc != null ? socColor(soc) : '#6b7280';
  const label = 'House ' + (index + 1);
  const current = data['current'] != null ? Number(data['current']) : null;
  const currentColor = current == null ? '' : current < 0 ? 'var(--red)' : '#60a5fa';
  return `<div class="battery-group">
    <div class="battery-name">${label}</div>
    <div class="battery-stats">
      <div>
        <div class="stat-label">Voltage</div>
        <div class="stat-value">${fmt(data['voltage'])}<span class="stat-unit">V</span></div>
      </div>
      <div>
        <div class="stat-label">Current</div>
        <div class="stat-value"${currentColor ? ' style="color:' + currentColor + '"' : ''}>${fmt(current)}<span class="stat-unit">A</span></div>
      </div>
      ${soc != null ? `<div class="stat-row" style="grid-column:span 2">
        <div class="stat-label">State of Charge</div>
        <div class="stat-value" style="color:${color}">${soc}<span class="stat-unit">%</span></div>
      </div>` : '<div></div><div></div>'}
    </div>
    ${soc != null ? `<div class="soc-bar">
      <div class="soc-track">
        <div class="soc-fill" style="width:${soc}%; background:${color}"></div>
      </div>
      <div class="soc-labels"><span>0%</span><span>50%</span><span>100%</span></div>
    </div>` : ''}
  </div>`;
}

function renderPower() {
  const el = document.getElementById('tab-power');
  const houseBanks = getHouseBanks();

  // Discover engine battery banks dynamically from state keys
  const banks = {};
  for (const [path, val] of Object.entries(state)) {
    const m = path.match(/^sailsense\.batteries\.(.+)\.([^.]+)$/);
    if (!m) continue;
    const bank = m[1];
    const field = m[2];
    if (!banks[bank]) banks[bank] = {};
    banks[bank][field] = val;
  }

  if (Object.keys(houseBanks).length === 0 && Object.keys(banks).length === 0) {
    el.innerHTML = '<p class="placeholder">No battery data yet — check plugin connection</p>';
    return;
  }

  let html = '';

  if (Object.keys(houseBanks).length > 0) {
    html += '<div class="tank-group">'
      + '<div class="tank-section-title">House Batteries</div>'
      + '<div class="grid">'
      + Object.entries(houseBanks).map(([id, data], i) => renderHouseBatteryCard(id, data, i)).join('')
      + '</div></div>';
  }

  if (Object.keys(banks).length > 0) {
    html += '<div class="tank-group">'
      + '<div class="tank-section-title">Engine Batteries</div>'
      + '<div class="grid">'
      + Object.entries(banks).map(([bank, data]) => {
          const pct = data.percentage != null ? Math.round(Number(data.percentage)) : null;
          const color = pct != null ? socColor(pct) : '#6b7280';
          const bankLower = bank.toLowerCase();
          const label = /port/.test(bankLower) ? 'Port'
            : /stbd|starboard/.test(bankLower) ? 'Stbd'
            : bank.replace(/\./g, ' › ');
          return `<div class="battery-group">
            <div class="battery-name">${label}</div>
            <div class="battery-stats">
              <div>
                <div class="stat-label">Voltage</div>
                <div class="stat-value">${fmt(data.voltage)}<span class="stat-unit">V</span></div>
              </div>
              <div>
                <div class="stat-label">Current</div>
                <div class="stat-value">${fmt(data.current)}<span class="stat-unit">A</span></div>
              </div>
              ${data.remaining != null ? `<div class="stat-row" style="grid-column:span 2">
                <div class="stat-label">Remaining</div>
                <div class="stat-value">${fmt(data.remaining)}<span class="stat-unit">Ah</span></div>
              </div>` : ''}
              ${pct != null ? `<div class="stat-row" style="grid-column:span 2">
                <div class="stat-label">State of Charge</div>
                <div class="stat-value" style="color:${color}">${pct}<span class="stat-unit">%</span></div>
              </div>` : ''}
            </div>
            ${pct != null ? `<div class="soc-bar">
              <div class="soc-track">
                <div class="soc-fill" style="width:${pct}%; background:${color}"></div>
              </div>
              <div class="soc-labels"><span>0%</span><span>50%</span><span>100%</span></div>
            </div>` : ''}
          </div>`;
        }).join('')
      + '</div></div>';
  }

  el.innerHTML = html;
}

// ─── Tanks tab ────────────────────────────────────────────────────────────────

function renderTankCard(label, levelPrefix, type) {
  const pct    = state[levelPrefix + '.pct'];
  const litres = state[levelPrefix + '.L'];
  const display = pct != null ? Math.round(Number(pct)) : null;
  const currentGal = litres != null ? Number(litres) * 0.264172 : null;
  const totalGal   = (litres != null && pct != null && Number(pct) > 0)
    ? Number(litres) * 100 / Number(pct) * 0.264172 : null;
  const volLabel = currentGal != null && totalGal != null
    ? fmt(currentGal, 1) + ' / ' + fmt(totalGal, 0) + ' gal'
    : currentGal != null ? fmt(currentGal, 1) + ' gal' : 'No data';
  return `<div class="tank-card">
    <div class="tank-header">
      <span class="tank-name">${label}</span>
      <span class="tank-pct">${display != null ? display + '%' : '–'}</span>
    </div>
    <div class="tank-track">
      <div class="tank-fill ${type}" style="width:${Math.min(display != null ? display : 0, 100)}%"></div>
    </div>
    <div class="tank-litres">${volLabel}</div>
  </div>`;
}

function renderTanks() {
  const base = 'sailsense.tanks';
  document.getElementById('tab-tanks').innerHTML = `
    <div class="tank-group">
      <div class="tank-section-title">Fresh Water (285 L each)</div>
      <div class="grid">
        ${renderTankCard('Port Fresh Water', base + '.water_tanks.water_tank_portside.levels', 'water')}
        ${renderTankCard('Stbd Fresh Water', base + '.water_tanks.water_tank_starboard.levels', 'water')}
      </div>
    </div>
    <div class="tank-group">
      <div class="tank-section-title">Diesel / Fuel (276 L each)</div>
      <div class="grid">
        ${renderTankCard('Port Fuel', base + '.gazoil_tanks.gazoil_tank_portside.levels', 'fuel')}
        ${renderTankCard('Stbd Fuel', base + '.gazoil_tanks.gazoil_tank_starboard.levels', 'fuel')}
      </div>
    </div>
    <div class="tank-group">
      <div class="tank-section-title">Blackwater (63 L each)</div>
      <div class="grid">
        ${renderTankCard('Port Blackwater', base + '.blackwater_tanks.blackwater_tank_portside.levels', 'black')}
        ${renderTankCard('Stbd Blackwater', base + '.blackwater_tanks.blackwater_tank_starboard.levels', 'black')}
      </div>
    </div>
  `;
}

// ─── Breakers tab ─────────────────────────────────────────────────────────────

function bindBreakerTile(tile) {
  tile.addEventListener('click', function() {
    var key = tile.dataset.key;
    var newVal = !isOn(state['sailsense.breakers.' + key + '.state']);
    // Optimistic update: flip the dot immediately so touch feels instant.
    // The real state arrives via WS/REST within ~1 s and will correct if needed.
    state['sailsense.breakers.' + key + '.state'] = newVal ? 'on' : 'off';
    tile.querySelector('.breaker-dot').className = 'breaker-dot ' + (newVal ? 'on' : 'off');
    tile.querySelector('.breaker-val').textContent = newVal ? 'ON' : 'OFF';
    toggleBreaker(key, newVal);
  });
}

function initBreakers() {
  var container = document.getElementById('tab-breakers');
  container.innerHTML =
    '<div class="breaker-grid">' +
    BREAKERS.map(function(name) {
      var key = toKey(name);
      return '<button type="button" class="breaker" data-key="' + key + '">' +
        '<div class="breaker-dot"></div>' +
        '<div>' +
          '<div class="breaker-name">' + toTitleCase(toLabel(name)) + '</div>' +
          '<div class="breaker-val">no data</div>' +
        '</div>' +
        '</button>';
    }).join('') +
    '</div>';
  var tiles = container.querySelectorAll('.breaker');
  for (var i = 0; i < tiles.length; i++) { bindBreakerTile(tiles[i]); }
}

function renderBreakers() {
  BREAKERS.forEach(function(name) {
    var key   = toKey(name);
    var val   = state['sailsense.breakers.' + key + '.state'];
    var on    = isOn(val);
    var off   = val === false || val === 'off' || val === 'False';
    var cls   = on ? 'on' : off ? 'off' : '';
    var label = val == null ? 'no data' : on ? 'ON' : 'OFF';
    var tile  = document.querySelector('.breaker[data-key="' + key + '"]');
    if (!tile) return;
    tile.querySelector('.breaker-dot').className = 'breaker-dot' + (cls ? ' ' + cls : '');
    tile.querySelector('.breaker-val').textContent = label;
  });
}

// ─── Lights & Pumps tab ───────────────────────────────────────────────────────

function renderLightItem(label, path) {
  const val = state[path];
  const on  = isOn(val);
  return `<div class="light-item">
    <div class="light-dot ${on ? 'on' : ''}"></div>
    <span class="light-name">${toTitleCase(label)}</span>
  </div>`;
}

function renderLights() {
  let html = '';

  for (const { title, group, names, prefix = '' } of LIGHT_GROUPS) {
    html += `<div class="light-section">
      <div class="light-section-title">${title}</div>
      <div class="light-grid">
        ${names.map(n => renderLightItem(prefix + n, `sailsense.actions.${group}.${toKey(n)}.state`)).join('')}
      </div>
    </div>`;
  }

  for (const { title, group, names } of PUMP_GROUPS) {
    html += `<div class="light-section">
      <div class="light-section-title">${title}</div>
      <div class="light-grid">
        ${names.map(n => renderLightItem(toLabel(n), `sailsense.actions.${group}.${toKey(n)}.state`)).join('')}
      </div>
    </div>`;
  }

  document.getElementById('tab-lights').innerHTML = html;
}

// ─── Boot ─────────────────────────────────────────────────────────────────────

// Restore tab from URL hash on load
const initialTab = location.hash.slice(1);
if (document.getElementById('tab-' + initialTab)) activateTab(initialTab);

// ─── SK login overlay ────────────────────────────────────────────────────────

var pendingPut = null; // {key, value} saved while the login overlay is open

function showLoginOverlay(key, value) {
  pendingPut = { key: key, value: value };
  var ov = document.getElementById('sk-login-overlay');
  if (!ov) {
    ov = document.createElement('div');
    ov.id = 'sk-login-overlay';
    ov.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;' +
      'background:rgba(0,0,0,0.65);z-index:10000;' +
      'display:flex;align-items:center;justify-content:center;';
    var inputStyle = 'display:block;width:100%;box-sizing:border-box;' +
      'padding:0.5rem 0.75rem;margin-bottom:0.6rem;' +
      'background:var(--surface);border:1px solid var(--border);border-radius:4px;' +
      'color:inherit;font-size:16px;font-family:inherit;';
    ov.innerHTML =
      '<div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;' +
      'padding:1.5rem;width:300px;max-width:90vw;">' +
        '<div style="font-weight:600;font-size:1rem;margin-bottom:0.4rem;">Signal K Login</div>' +
        '<div style="font-size:0.85rem;color:var(--muted);margin-bottom:1rem;">' +
          'Enter your Signal K credentials to enable breaker control.' +
        '</div>' +
        '<input id="sk-user" type="text" placeholder="Username" autocomplete="username" style="' + inputStyle + '">' +
        '<input id="sk-pass" type="password" placeholder="Password" autocomplete="current-password" style="' + inputStyle + '">' +
        '<div id="sk-err" style="color:var(--red);font-size:0.8rem;min-height:1.1rem;margin-bottom:0.5rem;"></div>' +
        '<div style="text-align:right;">' +
          '<button id="sk-login-btn" type="button" style="' +
            'background:var(--accent);color:#fff;border:none;border-radius:4px;' +
            'padding:0.45rem 1.1rem;font-size:0.9rem;cursor:pointer;font-family:inherit;">Log In</button>' +
        '</div>' +
      '</div>';
    document.body.appendChild(ov);
    document.getElementById('sk-login-btn').addEventListener('click', doSkLogin);
    document.getElementById('sk-pass').addEventListener('keydown', function(e) {
      if (e.keyCode === 13) doSkLogin();
    });
    ov.addEventListener('click', function(e) {
      if (e.target === ov) { ov.style.display = 'none'; pendingPut = null; }
    });
  }
  document.getElementById('sk-err').textContent = '';
  ov.style.display = 'flex';
  setTimeout(function() {
    var u = document.getElementById('sk-user');
    if (u) u.focus();
  }, 80);
}

function doSkLogin() {
  var user = document.getElementById('sk-user').value.trim();
  var pass = document.getElementById('sk-pass').value;
  var errEl = document.getElementById('sk-err');
  var btn = document.getElementById('sk-login-btn');
  if (!user || !pass) { errEl.textContent = 'Enter username and password'; return; }
  btn.disabled = true;
  btn.textContent = 'Logging in…';
  fetch('/signalk/v1/auth/login', {
    method: 'POST',
    credentials: 'include',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username: user, password: pass }),
  }).then(function(r) {
    return r.json().then(function(body) { return { ok: r.ok, body: body }; });
  }).then(function(result) {
    btn.disabled = false;
    btn.textContent = 'Log In';
    if (result.ok) {
      if (result.body && result.body.token) {
        sessionToken = result.body.token;
        try { sessionStorage.setItem('sk-auth-token', sessionToken); } catch(e) {}
      }
      var ov = document.getElementById('sk-login-overlay');
      if (ov) ov.style.display = 'none';
      var p = pendingPut;
      pendingPut = null;
      if (p) toggleBreaker(p.key, p.value);
    } else {
      var msg = (result.body && result.body.message) ? result.body.message : 'Login failed';
      errEl.textContent = msg;
    }
  }).catch(function() {
    btn.disabled = false;
    btn.textContent = 'Log In';
    errEl.textContent = 'Network error — check connection';
  });
}

function toggleBreaker(key, newValue) {
  // Use the freshest available token: one from login session takes priority over the
  // static embedder token, so a re-login after a 401 immediately takes effect.
  var token = sessionToken || SK_TOKEN;
  var url = '/signalk/v1/api/vessels/self/sailsense/breakers/' + key + '/state';
  if (token) url += '?token=' + encodeURIComponent(token);
  var headers = { 'Content-Type': 'application/json' };
  if (token) headers['Authorization'] = 'Bearer ' + token;
  fetch(url, {
    method: 'PUT',
    credentials: 'include',
    headers: headers,
    body: JSON.stringify({ value: newValue }),
  }).then(function(r) {
    if (r.status === 401) {
      // Clear any stored token — it's invalid — and prompt for credentials.
      sessionToken = null;
      try { sessionStorage.removeItem('sk-auth-token'); } catch(e) {}
      showLoginOverlay(key, newValue);
    }
  }).catch(function() {});
}

initBreakers();
render();
fetchVesselName();
fetchAll();
setInterval(fetchAll, POLL_MS);
connectWS();
</script>
